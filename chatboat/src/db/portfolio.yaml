  Full stack engineer focused on backend systems and AI-driven automation.
  Open to full stack and AI engineering roles where I can build and ship production-ready AI systems.

personal_opinions:
  main_language: >
    Python is my primary language — it's what I used throughout my AI studies
    and my internship at Flowing Bee. That said, I've also worked with Java
    and .NET, and I'm comfortable picking up whatever stack a team uses.

  most_interesting_project: >
    My two AI projects — the fact checking system and the image similarity matcher.
    What made them interesting wasn't the results, it was the process: reading papers,
    testing different architectures, and figuring out what actually works. For the image
    project I landed on triplet training after going through the literature. For NLP,
    I settled on a retrieve-then-classify pipeline. Both ranked top 10. That kind of
    problem-solving from first principles is what I enjoy most.

  team_preference: >
    At Flowing Bee I worked in a 6-person Agile team where the seniors were genuinely
    invested in mentoring — they'd walk you through things you didn't know rather than
    just assign tasks. In client meetings everyone contributed from their own angle, then
    we'd synthesize that into the actual build. That kind of collaborative dynamic, where
    knowledge flows both ways and everyone has context on the full picture, is what I
    work best in.

  ideal_opportunity: >
    I want to be in an environment where engineers are expected to understand the 'why'
    behind what they build, not just the 'how'. At Flowing Bee I got a taste of that —
    sitting in client meetings, understanding the business problem before writing a single
    line of code. I want more of that. A role where I can grow into someone who bridges
    the technical and business sides, not just execute tickets.

  open_to_opportunities: >
    Yes, actively looking. Available to start immediately.

